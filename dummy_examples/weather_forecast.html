
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Pro Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 2rem;
            margin: 0;
        }

        .container { max-width: 900px; margin: auto; }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: var(--card);
            color: white;
        }

        .main-weather {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: var(--card);
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: var(--card);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
        }

        .loading-spinner {
            display: none; /* Toggle this via JS */
            text-align: center;
            padding: 2rem;
        }

        .error-msg {
            color: #f43f5e;
            background: #451a03;
            padding: 10px;
            border-radius: 8px;
            display: none;
            margin-bottom: 1rem;
        }

        .forecast-card {
            background: var(--card);
            padding: 1.2rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
            transition: transform 0.2s, border-color 0.2s;
        }

        .forecast-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .forecast-date {
            font-size: 0.9rem;
            font-weight: bold;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .forecast-icon {
            width: 60px;
            height: 60px;
        }

        .forecast-temps {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 8px 0;
            font-weight: bold;
        }

        .high {
            color: var(--text);
        }

        .low {
            color: #94a3b8;
        }

        .forecast-desc {
            font-size: 0.8rem;
            text-transform: capitalize;
            color: var(--accent);
        }
    </style>
    <script type="module" src="../assets/js/main.js"></script>
</head>
<body>

    <div class="container">
        <div class="search-box">
            <input type="text" id="city-input" placeholder="Enter city name (e.g. Paris)...">
            <button id="search-btn" style="background: var(--accent); border:none; padding: 12px 20px; border-radius: 8px; cursor:pointer;">Search</button>
        </div>

        <div id="error-banner" class="error-msg"></div>

        <div id="loader" class="loading-spinner">
            <div class="spinner">Loading weather data...</div>
        </div>

        <div id="weather-content">
            <div class="main-weather">
                <div>
                    <h1 id="city-name">---</h1>
                    <p id="description">---</p>
                    <h2 style="font-size: 3rem;" id="temp">--°C</h2>
                </div>
                <div style="text-align: right;">
                    <p>Humidity: <span id="humidity">--</span>%</p>
                    <p>Wind: <span id="wind">--</span> km/h</p>
                </div>
            </div>

            <div class="forecast-grid" id="forecast-container">
                <!--
                <div class="forecast-card">
                    <p class="forecast-date">Mon, 12 Oct</p>
                    <img src="https://openweathermap.org/img/wn/10d@2x.png" alt="Weather Icon" class="forecast-icon">
                    <div class="forecast-temps">
                        <span class="high">22°C</span>
                        <span class="low">14°C</span>
                    </div>
                    <p class="forecast-desc">Light Rain</p>
                </div>
                -->
            </div>
        </div>
    </div>
</body>
</html>
