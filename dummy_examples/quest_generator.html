<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quest Generator</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #f59e0b;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .quest-card {
            background: var(--card);
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 350px;
        }

        #quest-text {
            font-size: 1.25rem;
            margin: 1.5rem 0;
            min-height: 60px; /* Prevents layout jump when text loads */
        }

        #status-message {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 1rem;
            height: 1.2rem;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.95); }
        button:disabled { background: #475569; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="quest-card">
        <div id="status-message">Ready for a quest?</div>
        <h2 id="quest-text">Press the button to begin...</h2>
        <button id="fetch-btn">Generate Quest</button>
    </div>

    <script>

        async function getQuest() {
            const randomNumber = Math.ceil(Math.random() * 200)
            try {
                const response = await fetch(`https://jsonplaceholder.typicode.com/todos/${randomNumber}`)
                
                if (!response.ok) {
                    console.error()
                    return
                }

                const data = await response.json()
                return data.title

            } catch (error) {
                console.error("There was an error: ", error.message)
                return
            }
        }

        window.addEventListener('load', () => {
            const questStatus = document.getElementById('status-message')
            const questText = document.getElementById('quest-text')
            const getQuestButton = document.getElementById('fetch-btn')

            getQuestButton.addEventListener('click', async function () {
                questStatus.innerText = 'Loading...'
                getQuestButton.disabled = true

                const quest = await getQuest()
                if (quest) {
                    questStatus.innerText = 'Quest Generated!'
                    questText.innerText = quest
                } else {
                    questStatus.innerText = 'Error while fetching quest'
                    questText.innerText = "Try again later"
                }
                getQuestButton.disabled = false
            })

        })

    </script>
</body>
</html>
